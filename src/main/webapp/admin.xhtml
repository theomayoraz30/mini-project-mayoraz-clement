<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">
<ui:composition template="/WEB-INF/templates/BasicTemplate.xhtml">
    <ui:define name="title">Admin</ui:define>

    <f:metadata>
        <f:event type="preRenderView" listener="#{accountBean.requireLogin}"/>
    </f:metadata>

    <ui:define name="content">

        <h:panelGroup rendered="#{!accountService.admin}">
            <div class="alert alert-danger">Access denied.</div>
        </h:panelGroup>

        <h:panelGroup rendered="#{accountService.admin}">

            <h1 class="mb-1">Admin Panel</h1>
            <p class="text-muted mb-4">Manage series, seasons and episodes.</p>

            <div class="row g-4 mb-5">

                <div class="col-md-4">
                    <div class="card p-4 h-100">
                        <h5 class="card-title mb-3">Add a series</h5>
                        <h:form>
                            <div class="mb-2">
                                <label class="form-label">Title *</label>
                                <h:inputText value="#{seriesBean.newSeries.title}" required="true" styleClass="form-control"/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Description</label>
                                <h:inputTextarea value="#{seriesBean.newSeries.description}" rows="3" styleClass="form-control"/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Release year</label>
                                <h:inputText value="#{seriesBean.newSeries.releaseYear}" styleClass="form-control"/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Poster URL</label>
                                <h:inputText value="#{seriesBean.newSeries.posterUrl}" styleClass="form-control"/>
                            </div>
                            <h:commandButton value="Add series" action="#{seriesBean.addSeries}"
                                             styleClass="btn btn-primary w-100"/>
                        </h:form>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card p-4 h-100">
                        <h5 class="card-title mb-3">Add a season</h5>
                        <h:form>
                            <div class="mb-2">
                                <label class="form-label">Series *</label>
                                <h:selectOneMenu value="#{seasonBean.selectedSeriesId}" required="true" styleClass="form-select">
                                    <f:selectItem itemLabel="— Select —" itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItems value="#{seasonBean.seriesList}" var="s" itemValue="#{s.id}" itemLabel="#{s.title}"/>
                                </h:selectOneMenu>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Season number *</label>
                                <h:inputText value="#{seasonBean.newSeason.seasonNumber}" required="true" styleClass="form-control"/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Title</label>
                                <h:inputText value="#{seasonBean.newSeason.title}" styleClass="form-control"/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <h:inputTextarea value="#{seasonBean.newSeason.description}" rows="3" styleClass="form-control"/>
                            </div>
                            <h:commandButton value="Add season" action="#{seasonBean.addSeason}"
                                             styleClass="btn btn-primary w-100"/>
                        </h:form>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card p-4 h-100">
                        <h5 class="card-title mb-3">Add an episode</h5>
                        <h:form>
                            <div class="mb-2">
                                <label class="form-label">Season *</label>
                                <h:selectOneMenu value="#{seasonBean.selectedSeasonId}" required="true" styleClass="form-select">
                                    <f:selectItem itemLabel="— Select —" itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItems value="#{seasonBean.allSeasons}" var="sa"
                                                   itemValue="#{sa.id}"
                                                   itemLabel="#{sa.series.title} — S#{sa.seasonNumber}"/>
                                </h:selectOneMenu>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Episode number *</label>
                                <h:inputText value="#{seasonBean.newEpisode.episodeNumber}" required="true" styleClass="form-control"/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Title</label>
                                <h:inputText value="#{seasonBean.newEpisode.title}" styleClass="form-control"/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Duration (minutes)</label>
                                <h:inputText value="#{seasonBean.newEpisode.durationMinutes}" styleClass="form-control"/>
                            </div>
                            <h:commandButton value="Add episode" action="#{seasonBean.addEpisode}"
                                             styleClass="btn btn-primary w-100"/>
                        </h:form>
                    </div>
                </div>

            </div>

            <h4 class="mb-3">Existing series</h4>
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>Title</th><th>Year</th><th style="width:120px;"></th></tr>
                </thead>
                <tbody>
                    <ui:repeat value="#{seriesBean.seriesList}" var="s">
                        <tr>
                            <td>#{s.title}</td>
                            <td class="text-muted">#{s.releaseYear}</td>
                            <td>
                                <h:form>
                                    <h:commandButton value="Delete" action="#{seriesBean.deleteSeries(s)}"
                                                     styleClass="btn btn-sm btn-outline-danger"
                                                     onclick="return confirm('Delete this series?')"/>
                                </h:form>
                            </td>
                        </tr>
                    </ui:repeat>
                </tbody>
            </table>

        </h:panelGroup>
    </ui:define>
</ui:composition>
</html>
