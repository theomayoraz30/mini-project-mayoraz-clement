<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html">
<ui:composition template="/WEB-INF/templates/BasicTemplate.xhtml">
    <ui:define name="title">Login</ui:define>
    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <h2 class="mb-4">Login</h2>
                <div class="card p-4">
                    <h:form>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <h:inputText value="#{accountBean.username}" required="true" styleClass="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <h:inputSecret value="#{accountBean.password}" required="true" styleClass="form-control"/>
                        </div>
                        <h:commandButton value="Login" action="#{accountBean.login}"
                                         styleClass="btn btn-primary w-100"/>
                        <h:outputText value="#{accountBean.errorMessage}"
                                      styleClass="text-danger d-block mt-2"
                                      rendered="#{not empty accountBean.errorMessage}"/>
                    </h:form>
                </div>
                <p class="mt-3 text-center">
                    No account? <h:link value="Sign up" outcome="register"/>
                </p>
            </div>
        </div>
    </ui:define>
</ui:composition>
</html>
