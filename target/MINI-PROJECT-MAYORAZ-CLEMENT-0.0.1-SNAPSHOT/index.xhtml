<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

<ui:composition template="/WEB-INF/templates/BasicTemplate.xhtml">
    <ui:define name="title">Series App</ui:define>

    <f:metadata>
        <f:event type="preRenderView" listener="#{accountBean.requireLogin}"/>
    </f:metadata>

    <ui:define name="content">

        <h1 class="mb-4">All Series</h1>

        <h:form styleClass="d-flex gap-2 mb-4">
            <h:inputText value="#{seriesBean.searchQuery}" styleClass="form-control"
                         placeholder="Search..." style="max-width:300px;"/>
            <h:commandButton value="Search" action="#{seriesBean.search}" styleClass="btn btn-primary"/>
            <h:commandButton value="Show all" action="#{seriesBean.loadAll}" styleClass="btn btn-secondary"/>
        </h:form>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            <ui:repeat value="#{seriesBean.seriesList}" var="s">
                <div class="col">
                    <div class="card h-100">
                        <h:panelGroup rendered="#{not empty s.posterUrl}">
                            <h:graphicImage value="#{s.posterUrl}"
                                            styleClass="card-img-top"
                                            style="height:200px;object-fit:cover;"/>
                        </h:panelGroup>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">#{s.title}</h5>
                            <p class="card-text text-muted small">#{s.releaseYear}</p>
                            <p class="card-text flex-grow-1">#{s.description}</p>

                            <h:panelGroup rendered="#{accountService.viewer}">
                                <h:panelGroup rendered="#{progressBean.getSeriesStatus(s).name() == 'NOT_STARTED'}">
                                    <span class="badge bg-secondary mb-2">Not started</span>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{progressBean.getSeriesStatus(s).name() == 'IN_PROGRESS'}">
                                    <span class="badge bg-primary mb-2">In progress</span>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{progressBean.getSeriesStatus(s).name() == 'WATCHED'}">
                                    <span class="badge bg-success mb-2">Completed ✓</span>
                                </h:panelGroup>
                            </h:panelGroup>

                            <h:form>
                                <h:commandButton value="View details"
                                                 action="#{seriesBean.selectSeries(s)}"
                                                 styleClass="btn btn-dark btn-sm mt-2"/>
                            </h:form>
                        </div>
                    </div>
                </div>
            </ui:repeat>
        </div>

    </ui:define>
</ui:composition>
</html>
